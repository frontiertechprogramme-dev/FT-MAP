    --fth-navy: #334267;
    --fth-yellow: #F2F465;
    --fth-grey: #EFEFEF;
    --fth-slate: #343047;
    font-family: "Open Sans", Arial, sans-serif;
    background: var(--fth-teal);
    position: relative;
    width: 100%;
    min-height: 720px;
    overflow: hidden;
  }

  #fth-map-root .fth-app {
    height: 100%;
    min-height: 720px;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  #fth-map-root .fth-toolbar {
    padding: 10px 14px;
    background: var(--fth-navy);
    color: #ffffff;
    display: flex;
    gap: 10px;
    align-items: center;
    border-bottom: 1px solid var(--fth-teal);
    z-index: 5;
    flex-wrap: wrap;
  }

  #fth-map-root .fth-toolbar label {
    font-size: 14px;
    opacity: 0.85;
  }

  #fth-map-root .fth-project-count {
    font-size: 13px;
    color: #ffffff;
    opacity: 0.75;
    margin-left: 0;
    padding-right: 10px;
    order: 4;
  }

  #fth-map-root .fth-theme-select {
    display: none;
  }

  #fth-map-root .fth-theme-dropdown {
    position: relative;
    min-width: 280px;
  }

  #fth-map-root .fth-theme-dropdown-button {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    background: #111;
    color: #fff;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 10px;
    padding: 8px 12px;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
  }

  #fth-map-root .fth-theme-dropdown-selected {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
  }

  #fth-map-root .fth-theme-dropdown-circle {
    width: 10px;
    height: 10px;
    border-radius: 999px;
    flex: 0 0 10px;
    border: 1px solid rgba(255,255,255,0.35);
    background: #ffffff;
  }

  #fth-map-root .fth-theme-dropdown-caret {
    font-size: 12px;
    opacity: 0.8;
  }

  #fth-map-root .fth-theme-dropdown-menu {
    position: absolute;
    top: calc(100% + 6px);
    left: 0;
    right: 0;
    background: rgba(17,17,17,0.98);
    border: 1px solid rgba(255,255,255,0.16);
    border-radius: 12px;
    box-shadow: 0 14px 30px rgba(0,0,0,0.28);
    padding: 6px;
    display: none;
    z-index: 20;
    max-height: 320px;
    overflow-y: auto;
  }

  #fth-map-root .fth-theme-dropdown.open .fth-theme-dropdown-menu {
    display: block;
  }

  #fth-map-root .fth-theme-dropdown-option {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 10px;
    background: transparent;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 14px;
    text-align: left;
    cursor: pointer;
    font-family: inherit;
  }

  #fth-map-root .fth-theme-dropdown-option:hover,
  #fth-map-root .fth-theme-dropdown-option.active {
    background: rgba(255,255,255,0.1);
  }

  #fth-map-root .fth-theme-dropdown-option .fth-theme-dropdown-circle {
    border-color: rgba(255,255,255,0.25);
  }

  #fth-map-root .fth-toggle-group {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-left: auto;
    order: 3;
  }

  #fth-map-root .fth-toggle-group label {
    margin: 0;
    font-size: 13px;
  }

  #fth-map-root .fth-toggle-switch {
    display: inline-flex;
    background: rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 2px;
    border: 1px solid rgba(255,255,255,0.25);
  }

  #fth-map-root .fth-toggle-option {
    padding: 6px 12px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    border: none;
    background: transparent;
    color: rgba(255,255,255,0.7);
    transition: all 0.2s ease;
    border-radius: 18px;
    font-family: inherit;
  }

  #fth-map-root .fth-toggle-option.active {
    background: var(--fth-teal);
    color: #ffffff;
  }

  #fth-map-root .fth-map {
    flex: 1;
    min-height: 640px;
    background: var(--fth-teal);
    z-index: 1;
  }

  #fth-map-root .leaflet-popup-tip { display: none; }

  #fth-map-root .leaflet-popup-content-wrapper {
    border-radius: 16px;
    overflow: hidden;
    padding: 0;
    background: #ffffff;
  }

  #fth-map-root .project-popup .leaflet-popup-content-wrapper::after {
    content: "";
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    bottom: -14px;
    width: 0;
    height: 0;
    border-left: 14px solid transparent;
    border-right: 14px solid transparent;
    border-top: 14px solid #ffffff;
    z-index: 1;
  }

  #fth-map-root .leaflet-popup {
    border-radius: 16px;
  }

  #fth-map-root .project-popup .leaflet-popup-content {
    margin: 0;
    width: 420px;
    max-height: 360px;
    overflow: auto;
    background: #ffffff;
  }

  #fth-map-root .project-popup .popup-header {
    padding: 14px 14px 10px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.12);
    background: var(--fth-navy);
    margin: 0;
    position: sticky;
    top: 0;
    z-index: 2;
  }

  #fth-map-root .project-popup .popup-title {
    font-family: "Open Sans", Arial, sans-serif;
    font-weight: 600;
    font-size: 16px;
    text-transform: none;
    letter-spacing: normal;
    color: var(--fth-cyan);
  }

  #fth-map-root .project-popup .popup-meta {
    font-size: 12px;
    color: #ffffff;
    opacity: 1;
    margin-top: 2px;
  }

  #fth-map-root .project-popup .popup-body {

    max-height: 300px;
    overflow-y: auto;
    overflow-x: hidden;
    background: #ffffff;

    margin-bottom: 12px;
    background: transparent;
    border-radius: 12px;
    border: 1px solid var(--fth-teal);
    box-shadow: none;
  }

  #fth-map-root .panel-project-title {
    font-family: "Exo 2", "Open Sans", Arial, sans-serif;
    font-weight: 800;
    font-size: 18px;
    margin: 0 0 6px 0;
    color: var(--fth-slate);
    padding-bottom: 8px;
    border-bottom: 1px solid var(--fth-teal);
  }

  #fth-map-root .panel-row {
    font-size: 13px;
    color: var(--fth-slate);
  }

  #fth-map-root .panel-row strong { font-weight: 700; }

  #fth-map-root .theme-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  #fth-map-root .theme-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 0;
    border-radius: 0;
    background: transparent;
    border: none;
    font-size: 12px;
    color: var(--fth-slate);
    white-space: nowrap;
  }

  #fth-map-root .theme-dot {
    width: 8px;
    height: 8px;
    border-radius: 999px;
    display: inline-block;
    border: 1px solid rgba(255,255,255,0.35);
  }

  #fth-map-root .meta-stack {
    margin-top: 16px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  #fth-map-root .meta-row {
    display: flex;
    flex-direction: row;
    gap: 8px;
    align-items: baseline;
    flex-wrap: wrap;
  }

  #fth-map-root .meta-label {
    font-size: 13px;
    color: var(--fth-slate);
    font-weight: 700;
    line-height: 1.2;
  }

  #fth-map-root .project-button {
    display: inline-block;
    margin-top: 16px;
    margin-bottom: 0;
    padding: 8px 16px;
    background: transparent;
    color: var(--fth-teal) !important;
    text-decoration: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border: 1px solid var(--fth-teal);
    cursor: pointer;
    transition: background 0.2s ease;
  }

  #fth-map-root .project-button:hover {
    background: #156460;
    color: #ffffff !important;
  }

  #fth-map-root .project-button:visited,
  #fth-map-root .project-button:active {
    color: var(--fth-teal) !important;
  }

  #fth-map-root .project-button:hover:visited,
  #fth-map-root .project-button:hover:active {
    color: #ffffff !important;
  }

  @media (max-width: 640px) {
    #fth-map-root .fth-theme-dropdown {

      flex: 1 1 100%;
    }

    #fth-map-root .fth-map {
      min-height: 560px;
    }
  }
</style>

<div id="fth-map-root">
  <div class="fth-app">
    <div class="fth-toolbar">

      </div>
      <div id="fth-project-count" class="fth-project-count"></div>

    <div id="fth-map" class="fth-map"></div>
  </div>
</div>

  const sectorMap = {
    "Agriculture and food security": "Agriculture and Food Security",
    "Climate": "Climate",
    "Education": "Education",
    "Global health": "Global Health",
    "Human rights and Democracy": "Human Rights and Democracy",

  };

  const countryNameMap = {
    "DRC": "Democratic Republic of the Congo",
    "UK": "United Kingdom",
    "St Helena": "Saint Helena"
  };

  const groupedProjects = {};
  rawPilots.forEach((row) => {
    const iso = countryIsoMap[row.country];
    if (!iso) return;
    const countryLabel = countryNameMap[row.country] || row.country;
    const sectorLabel = sectorMap[row.sector] || row.sector;
    const statusLabel = row.pilot_status.toLowerCase() === "live" ? "Live" : "Closed";
    if (!groupedProjects[iso]) {
      groupedProjects[iso] = { iso_a3: iso, country: countryLabel, projects: [] };
    }
    groupedProjects[iso].projects.push({
      project: row.pilot,
      themes: [sectorLabel],
      pilot_status: statusLabel,
      url: row.url,
      question: row.question || ""
    });
  });

  const projects = Object.values(groupedProjects).sort((a, b) => a.country.localeCompare(b.country));
  const projectByIso = new Map(projects.map((p) => [String(p.iso_a3).trim().toUpperCase(), p]));

  const themeColors = {
    "Agriculture and Food Security": "#47eafc",
    "Climate": "#e76f51",
    "Education": "#ffd43b",
    "Global Health": "#ff4d6d",
    "Human Rights and Democracy": "#845ef7",
    "Humanitarian": "#f08c00",
    "Infrastructure and Energy": "#4dabf7",
    "Nature and Biodiversity": "#01f9c6",
    "Other": "#9ca3af",
    "Sustainable Economic Development": "#51cf66"
  };

  const defaultColor = "#ffffff";
  const themes = Array.from(new Set(projects.flatMap((p) => p.projects.flatMap((proj) => proj.themes))))
    .sort((a, b) => {
      if (a === "Other") return 1;
      if (b === "Other") return -1;
      return a.localeCompare(b);
    });

  const themeSelect = document.getElementById("fth-theme-select");
  const projectCountEl = document.getElementById("fth-project-count");
  const themeDropdown = document.getElementById("fth-theme-dropdown");
  const themeDropdownButton = document.getElementById("fth-theme-dropdown-button");
  const themeDropdownMenu = document.getElementById("fth-theme-dropdown-menu");
  const themeDropdownSelectedLabel = document.getElementById("fth-theme-selected-label");
  const themeDropdownSelectedCircle = document.getElementById("fth-theme-selected-circle");

  let statusFilter = "live";
  let geoLayer = null;
  let pinnedPopup = null;
  let ukraineOverlayLayer = null;

  function currentThemeColor() {
    const selected = themeSelect.value;
    if (selected === "__ALL__") return defaultColor;
    return themeColors[selected] || defaultColor;
  }

  function hasMatchingProjectsForIso(iso) {
    const countryProjects = projectByIso.get(iso);
    if (!countryProjects) return false;

    return countryProjects.projects.some((proj) => {
      const themeMatch = themeSelect.value === "__ALL__" || proj.themes.includes(themeSelect.value);
      const statusMatch = statusFilter === "all" || proj.pilot_status === "Live";
      return themeMatch && statusMatch;
    });
  }

  function visibleCountryStyleForIso(iso) {
    const base = {
      color: "#ffffff",
      weight: 0.8,
      opacity: 0.35,
      fillOpacity: 0
    };

    const countryProjects = projectByIso.get(iso);
    if (!countryProjects) return base;

    const hasMatchingProject = hasMatchingProjectsForIso(iso);
    if (!hasMatchingProject) return base;

    const fill = themeSelect.value === "__ALL__" ? defaultColor : (themeColors[themeSelect.value] || defaultColor);
    return { ...base, opacity: 0.95, weight: 1.4, fillColor: fill, fillOpacity: 0.55 };
  }

  function ukraineOverlayStyle() {
    return visibleCountryStyleForIso("UKR");
  }

  function updateThemeDropdownUI() {
    const color = currentThemeColor();
    themeDropdownSelectedCircle.style.background = color;
    const selectedOption = themeSelect.options[themeSelect.selectedIndex];
    themeDropdownSelectedLabel.textContent = selectedOption ? selectedOption.textContent : "All projects";
    root.querySelectorAll(".fth-theme-dropdown-option").forEach((option) => {
      option.classList.toggle("active", option.dataset.value === themeSelect.value);
    });
  }

  function updateProjectCount() {
    let totalCount = 0;
    projects.forEach((countryProjects) => {
      totalCount += countryProjects.projects.filter((proj) => {
        const themeMatch = themeSelect.value === "__ALL__" || proj.themes.includes(themeSelect.value);
        const statusMatch = statusFilter === "all" || proj.pilot_status === "Live";
        return themeMatch && statusMatch;
      }).length;
    });
    projectCountEl.textContent = `${totalCount} Pilot${totalCount === 1 ? "" : "s"}`;
  }

  function buildThemeDropdown() {
    themeSelect.innerHTML = "";
    themeDropdownMenu.innerHTML = "";

    const allOpt = document.createElement("option");
    allOpt.value = "__ALL__";
    allOpt.textContent = "All projects";
    themeSelect.appendChild(allOpt);

    const allBtn = document.createElement("button");
    allBtn.type = "button";
    allBtn.className = "fth-theme-dropdown-option active";
    allBtn.dataset.value = "__ALL__";
    allBtn.innerHTML = `<span class="fth-theme-dropdown-circle" style="background:${defaultColor}"></span><span>All projects</span>`;
    themeDropdownMenu.appendChild(allBtn);

    themes.forEach((theme) => {
      const opt = document.createElement("option");
      opt.value = theme;
      opt.textContent = theme;
      themeSelect.appendChild(opt);

      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "fth-theme-dropdown-option";
      btn.dataset.value = theme;
      btn.innerHTML = `<span class="fth-theme-dropdown-circle" style="background:${themeColors[theme] || defaultColor}"></span><span>${theme}</span>`;
      themeDropdownMenu.appendChild(btn);
    });

    themeSelect.value = "__ALL__";
    updateThemeDropdownUI();
  }

  function getIsoFromFeature(feature) {
    const props = feature?.properties || {};
    const iso =
      props["ISO3166-1-Alpha-3"] ??
      props.ISO_A3 ??
      props.ADM0_A3 ??
      props.iso_a3 ??
      props.ISO3 ??
      props.id ??
      "";
    return String(iso).trim().toUpperCase();
  }

  function renderThemeChips(themeList) {
    return `
      <div class="theme-chips">
        ${(themeList || []).map((theme) => {
          const color = themeColors[theme] || defaultColor;
          return `
            <span class="theme-chip">
              <span class="theme-dot" style="background:${color}"></span>
              ${theme}
            </span>
          `;
        }).join("")}
      </div>
    `;
  }

  function renderStatusChip(status) {
    const statusColor = status === "Live" ? "#51cf66" : "#9ca3af";
    return `
      <span class="theme-chip">
        <span class="theme-dot" style="background:${statusColor}"></span>
        ${status}
      </span>
    `;
  }

  function getFilteredProjects(countryProjects) {
    return countryProjects.projects.filter((proj) => {
      const themeMatch = themeSelect.value === "__ALL__" || proj.themes.includes(themeSelect.value);
      const statusMatch = statusFilter === "all" || proj.pilot_status === "Live";
      return themeMatch && statusMatch;
    });
  }

  function buildPopupHTML(countryProjects) {
    const filtered = getFilteredProjects(countryProjects);
    if (filtered.length === 0) return "";
    return `
      <div class="popup-wrap">
        <div class="popup-header">
          <div class="popup-title">${countryProjects.country}</div>
          <div class="popup-meta">${filtered.length} Pilot${filtered.length === 1 ? "" : "s"}</div>
        </div>
        <div class="popup-body">
          ${filtered.map((proj) => `
            <div class="panel-project">
              <div class="panel-project-title">${proj.project}</div>
              ${proj.question ? `<div class="panel-row" style="margin-top: 12px;"><strong>Question:</strong> ${proj.question}</div>` : ""}
              <div class="meta-stack">
                <div class="meta-row">
                  <div class="meta-label">Pilot Status</div>
                  ${renderStatusChip(proj.pilot_status || "-")}
                </div>
                <div class="meta-row">
                  <div class="meta-label">Theme</div>
                  ${renderThemeChips(proj.themes)}
                </div>
              </div>
              ${proj.url ? `<a href="${proj.url}" class="project-button" target="_blank" rel="noopener noreferrer">Learn more</a>` : ""}
            </div>
          `).join("")}
        </div>
      </div>
    `;
  }

  function regionStyle(feature) {
    const iso = getIsoFromFeature(feature);
    return visibleCountryStyleForIso(iso);
  }

  function attachCountryInteractions(layer, iso, countryProjects) {
    layer.on("mouseover", (e) => {
      if (pinnedPopup) return;
      if (map._hoveredIso === iso) return;
      const html = buildPopupHTML(countryProjects);
      if (!html) return;
      map._hoveredIso = iso;
      const popup = L.popup({ autoPan: true, closeButton: false, className: "project-popup" })
        .setLatLng(e.latlng)
        .setContent(html);
      popup.openOn(map);
    });

    layer.on("mouseout", (e) => {
      if (pinnedPopup) return;
      const related = e?.originalEvent?.relatedTarget;
      if (related && related.closest && related.closest(".project-popup")) return;
      map._hoveredIso = null;
      map.closePopup();
    });

    layer.on("click", () => {
      const html = buildPopupHTML(countryProjects);
      if (!html) {
        clearPinnedPopup(map);
        return;
      }
      map._hoveredIso = iso;
      const popup = L.popup({ autoPan: true, closeButton: false, className: "project-popup" })
        .setLatLng(layer.getBounds().getCenter())
        .setContent(html);
      pinnedPopup = { iso, popup };
      popup.openOn(map);
    });
  }

  function reopenPinnedPopup(map) {
    if (!pinnedPopup || !geoLayer) return;
    const { iso } = pinnedPopup;
    const countryProjects = projectByIso.get(iso);
    if (!countryProjects) {
      pinnedPopup = null;
      map.closePopup();
      return;
    }
    const html = buildPopupHTML(countryProjects);
    if (!html) {
      pinnedPopup = null;
      map.closePopup();
      return;
    }
    const layer = geoLayer.getLayers().find((l) => getIsoFromFeature(l.feature) === iso);
    if (!layer) return;
    pinnedPopup.popup.setLatLng(layer.getBounds().getCenter()).setContent(html).openOn(map);
  }

  function clearPinnedPopup(map) {
    pinnedPopup = null;
    map._hoveredIso = null;
    map.closePopup();
  }

  const map = L.map("fth-map", {
    zoomControl: true,
    scrollWheelZoom: true,
    doubleClickZoom: true,
    touchZoom: true,
    dragging: true,
    zoomSnap: 0.5
  }).setView([15, 15], 2);

  map.zoomControl.setPosition("topright");

  const zoomStyle = document.createElement("style");
  zoomStyle.textContent = `
    #fth-map-root .leaflet-control-zoom a {
      background: #334267 !important;
      color: #ffffff !important;
      border-color: rgba(255,255,255,0.15) !important;
    }
    #fth-map-root .leaflet-control-zoom a:hover {
      background: #3f507d !important;
      color: #ffffff !important;
    }
  `;
  document.head.appendChild(zoomStyle);

  root.querySelectorAll(".fth-toggle-option").forEach((btn) => {
    btn.addEventListener("click", (e) => {
      root.querySelectorAll(".fth-toggle-option").forEach((b) => b.classList.remove("active"));
      e.target.classList.add("active");
      statusFilter = e.target.dataset.status;
      updateProjectCount();
      if (geoLayer) geoLayer.setStyle(regionStyle);
      if (ukraineOverlayLayer) ukraineOverlayLayer.setStyle(ukraineOverlayStyle);
      reopenPinnedPopup(map);
    });
  });

  themeDropdownButton.addEventListener("click", () => {
    const isOpen = themeDropdown.classList.toggle("open");
    themeDropdownButton.setAttribute("aria-expanded", isOpen ? "true" : "false");
  });

  themeDropdownMenu.addEventListener("click", (event) => {
    const option = event.target.closest(".fth-theme-dropdown-option");
    if (!option) return;
    themeSelect.value = option.dataset.value;
    updateThemeDropdownUI();
    updateProjectCount();
    if (geoLayer) geoLayer.setStyle(regionStyle);
      if (ukraineOverlayLayer) ukraineOverlayLayer.setStyle(ukraineOverlayStyle);
      reopenPinnedPopup(map);
    themeDropdown.classList.remove("open");
    themeDropdownButton.setAttribute("aria-expanded", "false");
  });

  document.addEventListener("click", (event) => {
    if (!themeDropdown.contains(event.target)) {
      themeDropdown.classList.remove("open");
      themeDropdownButton.setAttribute("aria-expanded", "false");
    }
  });

  buildThemeDropdown();
  updateProjectCount();

  (async () => {
      const urls = [window.FTH_GEOJSON_URL, ...(window.FTH_GEOJSON_FALLBACK_URLS || [])].filter(Boolean);
      let lastError = null;
      for (const url of urls) {
        try {
          const res = await fetch(url, { mode: "cors" });
          if (!res.ok) throw new Error(`GeoJSON fetch failed: ${res.status} ${res.statusText}`);
          const text = await res.text();
          const geojson = JSON.parse(text);
          return geojson;
        } catch (err) {
          lastError = new Error(`${url} -> ${err.message}`);
        }
      }
      throw lastError || new Error("GeoJSON fetch failed");
    })()
    .then((geojson) => {
      geoLayer = L.geoJSON(geojson, {
        style: regionStyle,
        onEachFeature: (feature, layer) => {
          const iso = getIsoFromFeature(feature);
          const countryProjects = projectByIso.get(iso);
          if (!countryProjects) return;
          attachCountryInteractions(layer, iso, countryProjects);
        }
      }).addTo(map);

      fetch(window.FTH_UKR_GEOJSON_URL, { mode: "cors" })
        .then((res) => {
          if (!res.ok) throw new Error(`Ukraine overlay fetch failed: ${res.status} ${res.statusText}`);
          return res.json();
        })
        .then((ukrGeojson) => {
          const ukrProjects = projectByIso.get("UKR");
          if (!ukrProjects) return;

          ukraineOverlayLayer = L.geoJSON(ukrGeojson, {
            style: ukraineOverlayStyle,
            onEachFeature: (feature, layer) => {
              attachCountryInteractions(layer, "UKR", ukrProjects);
            }
          }).addTo(map);

          ukraineOverlayLayer.bringToFront();
        })
        .catch((err) => {
          console.error("Error fetching Ukraine overlay", err);
        });

      map.on("click", (e) => {
        const clickedOnCountry = e.originalEvent?.target?.closest?.(".leaflet-interactive");
        const clickedOnPopup = e.originalEvent?.target?.closest?.(".project-popup");
        if (!clickedOnCountry && !clickedOnPopup) clearPinnedPopup(map);
      });

      const bounds = [];
      geoLayer.eachLayer((layer) => {
        const iso = getIsoFromFeature(layer.feature);
        if (projectByIso.has(iso)) bounds.push(layer.getBounds());
      });
      if (bounds.length) {
        const combined = bounds.reduce((acc, b) => acc.extend(b), bounds[0]);
        map.fitBounds(combined.pad(0.3));
      }
    })
    .catch((err) => {
      console.error("GeoJSON URLs tried:", [window.FTH_GEOJSON_URL, ...(window.FTH_GEOJSON_FALLBACK_URLS || [])]);
      console.error("Error fetching GeoJSON", err);
      const fallback = document.createElement("div");
      fallback.style.padding = "24px";
      fallback.style.color = "white";
      fallback.textContent = "Could not load country boundaries. Check the console for details.";
      document.getElementById("fth-map").appendChild(fallback);
    });

  map.on("popupopen", (e) => {
    const el = e.popup.getElement && e.popup.getElement();
    const content = el && el.querySelector(".popup-body");
    if (!content) return;

    const stop = (ev) => ev.stopPropagation();
    content.addEventListener("wheel", stop, { passive: false });
    content.addEventListener("touchstart", stop, { passive: false });
    content.addEventListener("touchmove", stop, { passive: false });

    const disableDragging = () => map.dragging.disable();
    const enableDragging = () => map.dragging.enable();
    content.addEventListener("mouseenter", disableDragging);
    content.addEventListener("mouseleave", enableDragging);
    content.addEventListener("touchstart", disableDragging, { passive: false });
    content.addEventListener("touchend", enableDragging, { passive: false });

    e.popup._cleanupScroll = () => {
      content.removeEventListener("wheel", stop);
      content.removeEventListener("touchstart", stop);
      content.removeEventListener("touchmove", stop);
      content.removeEventListener("mouseenter", disableDragging);
      content.removeEventListener("mouseleave", enableDragging);
      content.removeEventListener("touchstart", disableDragging);
      content.removeEventListener("touchend", enableDragging);
    };
  });

  map.on("popupclose", (e) => {
    if (e.popup && e.popup._cleanupScroll) e.popup._cleanupScroll();
  });
})();
</script>
