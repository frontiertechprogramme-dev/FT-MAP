    html, body {
      height: 100%;
      margin: 0;
      background: #1A807D;
      font-family: "Open Sans", Arial, sans-serif;
    }

    #app {
      height: 100%;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    #toolbar {
      padding: 10px 14px;
      background: #334267;
      color: #ffffff;
      display: flex;
      gap: 10px;
      align-items: center;
      border-bottom: 1px solid #1A807D;
      z-index: 5;
      flex-wrap: wrap;
    }

    #toolbar label {
      font-size: 14px;
      opacity: 0.85;
    }

    #projectCount {
      font-size: 13px;
      color: #ffffff;
      opacity: 0.75;
      margin-left: auto;
      padding-right: 10px;
    }

    #themeSelect {
      display: none;
    }

    .theme-dropdown {
      position: relative;
      min-width: 280px;
    }

    .theme-dropdown-button {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: #111;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 14px;
      cursor: pointer;
      font-family: inherit;
    }

    .theme-dropdown-selected {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .theme-dropdown-circle {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      flex: 0 0 10px;
      border: 1px solid rgba(255,255,255,0.35);
      background: #ffffff;
    }

    .theme-dropdown-caret {
      font-size: 12px;
      opacity: 0.8;
    }

    .theme-dropdown-menu {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      background: rgba(17,17,17,0.98);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 12px;
      box-shadow: 0 14px 30px rgba(0,0,0,0.28);
      padding: 6px;
      display: none;
      z-index: 20;
      max-height: 320px;
      overflow-y: auto;
    }

    .theme-dropdown.open .theme-dropdown-menu {
      display: block;
    }

    .theme-dropdown-option {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      background: transparent;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
      text-align: left;
      cursor: pointer;
      font-family: inherit;
    }

    .theme-dropdown-option:hover,
    .theme-dropdown-option.active {
      background: rgba(255,255,255,0.1);
    }

    .theme-dropdown-option .theme-dropdown-circle {
      border-color: rgba(255,255,255,0.25);
    }

    .toggle-group {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
    }

    .toggle-group label {
      margin: 0;
      font-size: 13px;
    }

    .toggle-switch {
      display: inline-flex;
      background: rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 2px;
      border: 1px solid rgba(255,255,255,0.25);
    }

    .toggle-option {
      padding: 6px 12px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.7);
      transition: all 0.2s ease;
      border-radius: 18px;
      font-family: inherit;
    }

    .toggle-option.active {
      background: #1A807D;
      color: #ffffff;
    }

    #map {
      flex: 1;
      background: #1A807D;
      z-index: 1;
    }

    .leaflet-control-attribution { display: none; }

    @media (max-width: 640px) {
      #infoPanel {
        left: 14px;
        right: 14px;
        width: auto;
        top: auto;
        bottom: 14px;
        max-height: 55vh;
      }

      .theme-dropdown {
        min-width: 220px;
        flex: 1 1 100%;
      }
    }
  </style>
</head>

      <select id="themeSelect" hidden></select>

      <div class="toggle-group">

        <div class="toggle-switch">

      </div>
      <div id="projectCount"></div>
    </div>

    <div id="map"></div>

    </div>

        { pilot: "Protecting white yam crops with banana-fibre paper", country: "Ghana", sector: "Agriculture and food security", pilot_status: "live", url: "https://www.frontiertechhub.org/pilot-portfolio/banana-fibre-paper" },
        { pilot: "Stop the spread", country: "Brazil", sector: "Nature and Biodiversity", pilot_status: "live", url: "https://www.frontiertechhub.org/pilot-portfolio/stop-the-spread" },
        { pilot: "SWaDE: Satellite-based water demand estimation", country: "Ethiopia", sector: "Agriculture and food security", pilot_status: "closed", url: "https://www.frontiertechhub.org/pilot-portfolio/swade" },
        { pilot: "Cool by Design", country: "Chad", sector: "Climate", pilot_status: "live", url: "https://www.frontiertechhub.org/pilot-portfolio/cool-by-design" },
        { pilot: "GenAI x Telemedicine & SRHR", country: "South Africa", sector: "Global health", pilot_status: "live", url: "https://www.frontiertechhub.org/pilot-portfolio/srh-x-genai" },
        { pilot: "IdentIA: Identifying missing persons in Mexico", country: "Mexico", sector: "Humanitarian", pilot_status: "live", url: "https://www.frontiertechhub.org/pilot-portfolio/identia" },
        { pilot: "Justice in Her Pocket", country: "Tanzania", sector: "Human rights and Democracy", pilot_status: "live", url: "https://www.frontiertechhub.org/pilot-portfolio/justice-in-her-pocket" },
        { pilot: "Mekong at Risk", country: "Thailand", sector: "Global health", pilot_status: "live", url: "https://www.frontiertechhub.org/pilot-portfolio/mekong-at-risk" },
        { pilot: "SpeakSafe", country: "Yemen", sector: "Humanitarian", pilot_status: "live", url: "https://www.frontiertechhub.org/pilot-portfolio/speaksafe" },
        { pilot: "Ukraine Investment Integrity", country: "Ukraine", sector: "Other", pilot_status: "live", url: "https://www.frontiertechhub.org/pilot-portfolio/ukraine-investment-integrity" },
        { pilot: "Last Mile Climate Insurance Payouts", country: "Philippines", sector: "Climate", pilot_status: "live", url: "https://www.frontiertechhub.org/pilot-portfolio/rare" },
        { pilot: "Market-backed Climate Insurance for Fisherfolk", country: "Philippines", sector: "Climate", pilot_status: "live", url: "https://www.frontiertechhub.org/pilot-portfolio/mayani" },
        { pilot: "Rainfall Insurance for Coffee Farmers", country: "Vietnam", sector: "Agriculture and food security", pilot_status: "live", url: "https://www.frontiertechhub.org/pilot-portfolio/hillridge" },
        { pilot: "AI Literacy Lab", country: "Lithuania", sector: "Human rights and Democracy", pilot_status: "live", url: "https://www.frontiertechhub.org/pilot-portfolio/ai-literacy-lab" },
        { pilot: "Economic Truth Dashboard", country: "Moldova", sector: "Human rights and Democracy", pilot_status: "live", url: "https://www.frontiertechhub.org/pilot-portfolio/economic-truth-dashboard" },
        { pilot: "Online amplification networks detector", country: "Bulgaria", sector: "Human rights and Democracy", pilot_status: "live", url: "https://www.frontiertechhub.org/pilot-portfolio/online-amplification-networks-detector" }
      ];

      const countryIsoMap = {
        "Bangladesh": "BGD",
        "Botswana": "BWA",
        "Brazil": "BRA",
        "Bulgaria": "BGR",
        "Chad": "TCD",
        "Colombia": "COL",
        "DRC": "COD",
        "Ethiopia": "ETH",
        "Ghana": "GHA",
        "India": "IND",
        "Iraq": "IRQ",
        "Jordan": "JOR",
        "Kenya": "KEN",
        "Liberia": "LBR",
        "Lithuania": "LTU",
        "Malawi": "MWI",
        "Malaysia": "MYS",
        "Mexico": "MEX",
        "Moldova": "MDA",
        "Mozambique": "MOZ",
        "Myanmar": "MMR",
        "Nepal": "NPL",
        "Nigeria": "NGA",
        "Pakistan": "PAK",
        "Palestine": "PSE",
        "Peru": "PER",
        "Philippines": "PHL",
        "Rwanda": "RWA",
        "Senegal": "SEN",
        "Sierra Leone": "SLE",
        "Solomon Islands": "SLB",
        "South Africa": "ZAF",
        "St Helena": "SHN",
        "Sudan": "SDN",
        "Tanzania": "TZA",
        "Thailand": "THA",
        "Uganda": "UGA",
        "UK": "GBR",
        "Ukraine": "UKR",
        "Venezuela": "VEN",
        "Vietnam": "VNM",
        "Yemen": "YEM",
        "Zambia": "ZMB",
        "Zimbabwe": "ZWE"
      };

      const sectorMap = {
        "Agriculture and food security": "Agriculture and Food Security",
        "Climate": "Climate",
        "Education": "Education",
        "Global health": "Global Health",
        "Human rights and Democracy": "Human Rights and Democracy",
        "Humanitarian": "Humanitarian",
        "Humanitarian Aid": "Humanitarian",
        "Infrastructure and energy": "Infrastructure and Energy",
        "Nature and Biodiversity": "Nature and Biodiversity",
        "Other": "Other",
        "Sustainable Economic Development": "Sustainable Economic Development"
      };

      const countryNameMap = {
        "DRC": "Democratic Republic of the Congo",
        "UK": "United Kingdom",
        "St Helena": "Saint Helena"
      };

      const groupedProjects = {};
      const unmappedSpreadsheetRows = [];

      rawPilots.forEach((row) => {
        const iso = countryIsoMap[row.country];
        if (!iso) {
          unmappedSpreadsheetRows.push(row);
          return;
        }

        const countryLabel = countryNameMap[row.country] || row.country;
        const sectorLabel = sectorMap[row.sector] || row.sector;
        const statusLabel = row.pilot_status.toLowerCase() === "live" ? "Live" : "Closed";

        if (!groupedProjects[iso]) {
          groupedProjects[iso] = {
            iso_a3: iso,
            country: countryLabel,
            projects: []
          };
        }

        groupedProjects[iso].projects.push({
          project: row.pilot,
          themes: [sectorLabel],
          pilot_status: statusLabel,
          url: row.url
        });
      });

      const projects = Object.values(groupedProjects).sort((a, b) => a.country.localeCompare(b.country));
      const projectByIso = new Map(projects.map((p) => [String(p.iso_a3).trim().toUpperCase(), p]));

      const themeColors = {
        "Agriculture and Food Security": "#47eafc",
        "Climate": "#7c3aed",
        "Education": "#ffd43b",
        "Global Health": "#ff4d6d",
        "Human Rights and Democracy": "#845ef7",
        "Humanitarian": "#f08c00",
        "Infrastructure and Energy": "#4dabf7",
        "Nature and Biodiversity": "#01f9c6",
        "Other": "#9ca3af",
        "Sustainable Economic Development": "#51cf66"
      };

      const defaultColor = "#ffffff";
      const themes = Array.from(new Set(projects.flatMap((p) => p.projects.flatMap((proj) => proj.themes)))).sort();

      const themeSelect = document.getElementById("themeSelect");
      const projectCountEl = document.getElementById("projectCount");
      const themeDropdown = document.getElementById("themeDropdown");
      const themeDropdownButton = document.getElementById("themeDropdownButton");
      const themeDropdownMenu = document.getElementById("themeDropdownMenu");
      const themeDropdownSelectedLabel = document.getElementById("themeDropdownSelectedLabel");
      const themeDropdownSelectedCircle = document.getElementById("themeDropdownSelectedCircle");

      let statusFilter = "live";
      let geoLayer = null;

      function currentThemeColor() {
        const selected = themeSelect.value;
        if (selected === "__ALL__") return defaultColor;
        return themeColors[selected] || defaultColor;
      }

      function updateThemeDropdownUI() {
        const color = currentThemeColor();
        themeDropdownSelectedCircle.style.background = color;
        const selectedOption = themeSelect.options[themeSelect.selectedIndex];
        themeDropdownSelectedLabel.textContent = selectedOption ? selectedOption.textContent : "All projects";

        document.querySelectorAll(".theme-dropdown-option").forEach((option) => {
          option.classList.toggle("active", option.dataset.value === themeSelect.value);
        });
      }

      function updateProjectCount() {
        let totalCount = 0;
        projects.forEach((countryProjects) => {
          totalCount += countryProjects.projects.filter((proj) => {
            const themeMatch = themeSelect.value === "__ALL__" || proj.themes.includes(themeSelect.value);
            const statusMatch = statusFilter === "all" || proj.pilot_status === "Live";
            return themeMatch && statusMatch;
          }).length;
        });
        projectCountEl.textContent = `${totalCount} Pilot${totalCount === 1 ? "" : "s"}`;
      }

      function buildThemeDropdown() {
        themeSelect.innerHTML = "";
        themeDropdownMenu.innerHTML = "";

        const allOpt = document.createElement("option");
        allOpt.value = "__ALL__";
        allOpt.textContent = "All projects";
        themeSelect.appendChild(allOpt);

        const allBtn = document.createElement("button");
        allBtn.type = "button";
        allBtn.className = "theme-dropdown-option active";
        allBtn.dataset.value = "__ALL__";
        allBtn.innerHTML = `<span class="theme-dropdown-circle" style="background:${defaultColor}"></span><span>All projects</span>`;
        themeDropdownMenu.appendChild(allBtn);

        themes.forEach((theme) => {
          const opt = document.createElement("option");
          opt.value = theme;
          opt.textContent = theme;
          themeSelect.appendChild(opt);

          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "theme-dropdown-option";
          btn.dataset.value = theme;
          btn.innerHTML = `<span class="theme-dropdown-circle" style="background:${themeColors[theme] || defaultColor}"></span><span>${theme}</span>`;
          themeDropdownMenu.appendChild(btn);
        });

        themeSelect.value = "__ALL__";
        updateThemeDropdownUI();
      }

      const toggleButtons = document.querySelectorAll(".toggle-option");
      toggleButtons.forEach((btn) => {
        btn.addEventListener("click", (e) => {
          toggleButtons.forEach((b) => b.classList.remove("active"));
          e.target.classList.add("active");
          statusFilter = e.target.dataset.status;
          updateProjectCount();
          if (geoLayer) geoLayer.setStyle(regionStyle);
          if (pinnedCountryIso) {
            const pinnedCountryProjects = projectByIso.get(pinnedCountryIso);
            if (pinnedCountryProjects) {
              const html = buildPopupHTML(pinnedCountryProjects);
              if (html) {
                const layer = geoLayer.getLayers().find((l) => getIsoFromFeature(l.feature) === pinnedCountryIso);
                if (layer) {
                  hoverPopup.setLatLng(layer.getBounds().getCenter()).setContent(html).openOn(map);
                }
              } else {
                closePanel();
              }
            }
          }
        });
      });
      });

      themeDropdownButton.addEventListener("click", () => {
        const isOpen = themeDropdown.classList.toggle("open");
        themeDropdownButton.setAttribute("aria-expanded", isOpen ? "true" : "false");
      });

      themeDropdownMenu.addEventListener("click", (event) => {
        const option = event.target.closest(".theme-dropdown-option");
        if (!option) return;
        themeSelect.value = option.dataset.value;
        updateThemeDropdownUI();
        updateProjectCount();
        if (geoLayer) geoLayer.setStyle(regionStyle);
        if (pinnedCountryIso) {
          const pinnedCountryProjects = projectByIso.get(pinnedCountryIso);
          if (pinnedCountryProjects) {
            const html = buildPopupHTML(pinnedCountryProjects);
            if (html) {
              const layer = geoLayer.getLayers().find((l) => getIsoFromFeature(l.feature) === pinnedCountryIso);
              if (layer) {
                hoverPopup.setLatLng(layer.getBounds().getCenter()).setContent(html).openOn(map);
              }
            } else {
              closePanel();
            }
          }
        }
        themeDropdown.classList.remove("open");
        themeDropdownButton.setAttribute("aria-expanded", "false");
      });

      document.addEventListener("click", (event) => {
        if (!themeDropdown.contains(event.target)) {
          themeDropdown.classList.remove("open");
          themeDropdownButton.setAttribute("aria-expanded", "false");
        }
      });

      const map = L.map("map", {
        zoomControl: true,
        scrollWheelZoom: true,
        doubleClickZoom: true,
        touchZoom: true,
        dragging: true,
        zoomSnap: 0.5
      }).setView([15, 15], 2);

      map.zoomControl.setPosition("topright");

      const hoverPopup = L.popup({
        autoPan: true,
        closeButton: false,
        className: "project-popup"
      });

      function getIsoFromFeature(feature) {
        const props = feature?.properties || {};
        const iso = props.ADM0_A3 ?? props.ISO_A3 ?? props.iso_a3 ?? props.ISO3 ?? props.id ?? "";
        return String(iso).trim().toUpperCase();
      }

      function renderThemeChips(themeList) {
        return `
          <div class="theme-chips">
            ${(themeList || []).map((theme) => {
              const color = themeColors[theme] || defaultColor;
              return `
                <span class="theme-chip">
                  <span class="theme-dot" style="background:${color}"></span>
                  ${theme}
                </span>
              `;
            }).join("")}
          </div>
        `;
      }

      function getFilteredProjects(countryProjects) {
        return countryProjects.projects.filter((proj) => {
          const themeMatch = themeSelect.value === "__ALL__" || proj.themes.includes(themeSelect.value);
          const statusMatch = statusFilter === "all" || proj.pilot_status === "Live";
          return themeMatch && statusMatch;
        });
      }

      function buildPopupHTML(countryProjects) {
        const filtered = getFilteredProjects(countryProjects);
        if (filtered.length === 0) return "";

        return `
          <div class="popup-wrap">
            <div class="popup-header">
              <div class="popup-title">${countryProjects.country}</div>
              <div class="popup-meta">${filtered.length} Pilot${filtered.length === 1 ? "" : "s"}</div>
            </div>
            <div class="popup-body">
              ${filtered.map((proj) => `
                <div class="panel-project">
                  <div class="panel-project-title">${proj.project}</div>
                  <div class="panel-row"><strong>Pilot Status:</strong> ${proj.pilot_status || "-"}</div>
                  ${renderThemeChips(proj.themes)}
                  ${proj.url ? `<a href="${proj.url}" class="project-button" target="_blank" rel="noopener noreferrer">Learn more</a>` : ""}
                </div>
              `).join("")}
            </div>
          </div>
        `;
      }

      function regionStyle(feature) {
        const iso = getIsoFromFeature(feature);
        const countryProjects = projectByIso.get(iso);

        const base = {
          color: "#ffffff",
          weight: 0.8,
          opacity: 0.35,
          fillOpacity: 0
        };

        if (!countryProjects) return base;

        const hasMatchingProject = countryProjects.projects.some((proj) => {
          const themeMatch = themeSelect.value === "__ALL__" || proj.themes.includes(themeSelect.value);
          const statusMatch = statusFilter === "all" || proj.pilot_status === "Live";
          return themeMatch && statusMatch;
        });

        if (!hasMatchingProject) return base;

        const fill = themeSelect.value === "__ALL__" ? defaultColor : (themeColors[themeSelect.value] || defaultColor);

        return {
          ...base,
          opacity: 0.95,
          weight: 1.4,
          fillColor: fill,
          fillOpacity: 0.55
        };
      }

      let pinnedCountryIso = null;

      function closePanel() {
        pinnedCountryIso = null;
        map.closePopup(hoverPopup);
      }

      const GEOJSON_URL = "https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_110m_admin_0_countries.geojson";

      async function init() {
        buildThemeDropdown();
        updateProjectCount();

        let geojson;
        try {
          const res = await fetch(GEOJSON_URL);
          if (!res.ok) throw new Error(`GeoJSON fetch failed: ${res.status} ${res.statusText}`);
          geojson = await res.json();
        } catch (err) {
          console.error("Error fetching GeoJSON", err);
          alert("Could not load country boundaries (GeoJSON). Check the console for details.");
          return;
        }

        geoLayer = L.geoJSON(geojson, {
          style: regionStyle,
          onEachFeature: (feature, layer) => {
            const iso = getIsoFromFeature(feature);
            const countryProjects = projectByIso.get(iso);
            if (!countryProjects) return;

            layer.on("mouseover", (e) => {
              if (pinnedCountryIso && pinnedCountryIso !== iso) return;
              const html = buildPopupHTML(countryProjects);
              if (!html) return;
              hoverPopup.setLatLng(e.latlng).setContent(html).openOn(map);
            });

            layer.on("mouseout", (e) => {
              if (pinnedCountryIso === iso) return;
              const related = e?.originalEvent?.relatedTarget;
              if (related && related.closest && related.closest(".project-popup")) return;
              map.closePopup(hoverPopup);
            });

            layer.on("click", () => {
              const html = buildPopupHTML(countryProjects);
              if (!html) {
                closePanel();
                return;
              }
              pinnedCountryIso = iso;
              hoverPopup.setLatLng(layer.getBounds().getCenter()).setContent(html).openOn(map);
            });
          }
        }).addTo(map);

        map.on("click", (e) => {
          const clickedOnCountry = e.originalEvent?.target?.closest?.(".leaflet-interactive");
          const clickedOnPopup = e.originalEvent?.target?.closest?.(".project-popup");
          if (!clickedOnCountry && !clickedOnPopup) closePanel();
        });

        const bounds = [];
        geoLayer.eachLayer((layer) => {
          const iso = getIsoFromFeature(layer.feature);
          if (projectByIso.has(iso)) bounds.push(layer.getBounds());
        });

        if (bounds.length) {
          const combined = bounds.reduce((acc, b) => acc.extend(b), bounds[0]);
          map.fitBounds(combined.pad(0.3));
        }
      }

      map.on("popupopen", (e) => {
        const el = e.popup.getElement && e.popup.getElement();
        const content = el && el.querySelector(".popup-body");
        if (!content) return;

        const stop = (ev) => ev.stopPropagation();
        content.addEventListener("wheel", stop, { passive: false });
        content.addEventListener("touchstart", stop, { passive: false });
        content.addEventListener("touchmove", stop, { passive: false });

        const disableDragging = () => map.dragging.disable();
        const enableDragging = () => map.dragging.enable();

        content.addEventListener("mouseenter", disableDragging);
        content.addEventListener("mouseleave", enableDragging);
        content.addEventListener("touchstart", disableDragging, { passive: false });
        content.addEventListener("touchend", enableDragging, { passive: false });

        e.popup._cleanupScroll = () => {
          content.removeEventListener("wheel", stop);
          content.removeEventListener("touchstart", stop);
          content.removeEventListener("touchmove", stop);
          content.removeEventListener("mouseenter", disableDragging);
          content.removeEventListener("mouseleave", enableDragging);
          content.removeEventListener("touchstart", disableDragging);
          content.removeEventListener("touchend", enableDragging);
        };
      });

      map.on("popupclose", (e) => {
        if (e.popup && e.popup._cleanupScroll) e.popup._cleanupScroll();
      });

      init();
    });
  </script>
