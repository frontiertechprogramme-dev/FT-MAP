  #app {

    display: flex;
    flex-direction: column;
    position: relative;
  }

    background: #334267;
    color: #ffffff;
    display: flex;
    gap: 10px;
    align-items: center;
    border-bottom: 1px solid #1A807D;
    z-index: 5;
  }

  #toolbar label {
    font-size: 14px;
    opacity: 0.85;
  }

  #projectCount {
    font-size: 13px;
    color: #ffffff;
    opacity: 0.75;
    margin-left: auto;
    padding-right: 10px;
  }

  #themeSelect {
    display: none;
  }

  .theme-dropdown {
    position: relative;
    min-width: 280px;
  }

  .theme-dropdown-button {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    background: #111;
    color: #fff;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 10px;
    padding: 8px 12px;
    font-size: 14px;
    cursor: pointer;
  }

  .theme-dropdown-selected {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
  }

  .theme-dropdown-circle {
    width: 10px;
    height: 10px;
    border-radius: 999px;
    flex: 0 0 10px;
    border: 1px solid rgba(255,255,255,0.35);
    background: #ffffff;
  }

  .theme-dropdown-caret {
    font-size: 12px;
    opacity: 0.8;
  }

  .theme-dropdown-menu {
    position: absolute;
    top: calc(100% + 6px);
    left: 0;
    right: 0;
    background: rgba(17,17,17,0.98);
    border: 1px solid rgba(255,255,255,0.16);
    border-radius: 12px;
    box-shadow: 0 14px 30px rgba(0,0,0,0.28);
    padding: 6px;
    display: none;
    z-index: 20;
    max-height: 320px;
    overflow-y: auto;
  }

  .theme-dropdown.open .theme-dropdown-menu {
    display: block;
  }

  .theme-dropdown-option {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 10px;
    background: transparent;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 14px;
    text-align: left;
    cursor: pointer;
  }

  .theme-dropdown-option:hover,
  .theme-dropdown-option.active {
    background: rgba(255,255,255,0.1);
  }

  .theme-dropdown-option .theme-dropdown-circle {
    border-color: rgba(255,255,255,0.25);
  }

  /* Toggle Switch */
  .toggle-group {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-left: auto;
  }

  .toggle-group label {
    margin: 0;
    font-size: 13px;
  }

  .toggle-switch {
    display: inline-flex;
    background: rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 2px;
    gap: 0;
    border: 1px solid rgba(255,255,255,0.25);
  }

  .toggle-option {
    padding: 6px 12px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    border: none;
    background: transparent;
    color: rgba(255,255,255,0.7);
    transition: all 0.2s ease;
    border-radius: 18px;
  }

  .toggle-option.active {
    background: #1A807D;
    color: #ffffff;
  }

  

  #map {
    flex: 1;
    background: #1A807D;
    z-index: 1;
  }

    right: 14px;

  }

  }  

  .leaflet-popup-content-wrapper {
    border-radius: 16px;
    overflow: hidden;
  }

  .leaflet-popup {
    border-radius: 16px;
  }  

  .scrollable-projects {

    overflow-y: auto;
    padding-top: 10px;

  .project-popup .leaflet-popup-content {

      const projectByIso = new Map(

        themeDropdownMenu.appendChild(btn);
      }
function currentThemeColor() {
        const selected = themeSelect.value;
        if (selected === "__ALL__") return defaultColor;
        return themeColors[selected] || defaultColor;
      }

      function updateThemeDot() {
        const color = currentThemeColor();
        themeDropdownSelectedCircle.style.background = color;
        const selectedOption = themeSelect.options[themeSelect.selectedIndex];
        themeDropdownSelectedLabel.textContent = selectedOption ? selectedOption.textContent : "All projects";

        document.querySelectorAll(".theme-dropdown-option").forEach(option => {
          option.classList.toggle("active", option.dataset.value === themeSelect.value);
        });
      }

      function updateProjectCount() {
        if (!projectCountEl) return;
        let totalCount = 0;
        
        projects.forEach(countryProjects => {
          const filtered = countryProjects.projects.filter(proj => {
            const themeMatch = themeSelect.value === "__ALL__" || proj.themes.includes(themeSelect.value);
            const statusMatch = statusFilter === "all" || proj.pilot_status === "Live";
            return themeMatch && statusMatch;
          });
          totalCount += filtered.length;
        });
        
        projectCountEl.textContent = `${totalCount} Pilot${totalCount === 1 ? "" : "s"}`;
      }

      updateThemeDot();
      updateProjectCount();

      const map = L.map("map", {
        zoomControl: true,
        scrollWheelZoom: true,
        doubleClickZoom: true,
        touchZoom: true,
        dragging: true,
        zoomSnap: 0.5
      }).setView([15, 15], 2);

      map.zoomControl.setPosition("topright");

      const hoverPopup = L.popup({
        autoPan: true,
        closeButton: false,
        className: "project-popup"
      });

      function buildPopupHTML(countryProjects) {
        const selectedTheme = themeSelect.value;

        const filtered = countryProjects.projects.filter(proj => {
          const themeMatch = selectedTheme === "__ALL__" || (proj.themes || []).includes(selectedTheme);
          const statusMatch = statusFilter === "all" || proj.pilot_status === "Live";
          return themeMatch && statusMatch;
        });

        if (filtered.length === 0) return "";

        const displayed = filtered.slice(0, 3);
        const extra = filtered.slice(3);

        return `
          <div class="popup-wrap">
            <div class="popup-header">
              <div class="popup-title">${countryProjects.country}</div>
              <div class="popup-meta">${filtered.length} Pilot${filtered.length === 1 ? "" : "s"}</div>
            </div>

            <div class="popup-body">
              ${displayed.map(proj => `
                <div class="panel-project">
                  <div class="panel-project-title">${proj.project}</div>
                  <div class="panel-row"><strong>Pilot Status:</strong> ${proj.pilot_status || "-"}</div>
                  ${renderThemeChips(proj.themes)}
                  ${proj.url ? `<a href="${proj.url}" class="project-button" target="_blank">Learn more</a>` : ""}
                </div>
              `).join("")}

              ${extra.length > 0 ? `
                <div class="panel-hint">Scroll for more Pilots.</div>
                <div class="scrollable-projects">
                  ${extra.map(proj => `
                    <div class="panel-project">
                      <div class="panel-project-title">${proj.project}</div>
                      <div class="panel-row"><strong>Pilot Status:</strong> ${proj.pilot_status || "-"}</div>
                      ${renderThemeChips(proj.themes)}
                      ${proj.url ? `<a href="${proj.url}" class="project-button" target="_blank">Learn more</a>` : ""}
                    </div>
                  `).join("")}
                </div>
              ` : ""}
            </div>
          </div>
        `;
      }

      function isActiveTheme(projectList, selectedTheme) {
        if (!projectList) return false;
        if (selectedTheme === "__ALL__") return true;
        return projectList.some(p => (p.themes || []).includes(selectedTheme));
      }

      function getIsoFromFeature(feature) {
        const props = feature?.properties || {};
        const iso =
          props.ADM0_A3 ?? props.ISO_A3 ?? props.iso_a3 ?? props.ISO3 ?? props.id ?? "";
        return String(iso).trim().toUpperCase();
      }

      function renderThemeChips(themeList) {
        return `
          <div class="theme-chips">
            ${(themeList || []).map(t => {
              const c = themeColors[t] || defaultColor;
              return `
                <span class="theme-chip">
                  <span class="theme-dot" style="background:${c}"></span>
                  ${t}
                </span>
              `;
            }).join("")}
          </div>
        `;
      }

      function regionStyle(feature) {
        const iso = getIsoFromFeature(feature);
        const countryProjects = projectByIso.get(iso);
        const selected = themeSelect.value;

        const base = {
          color: "#ffffff",
          weight: 0.8,
          opacity: 0.35,
          fillOpacity: 0
        };

        if (!countryProjects) return base;

        const active = isActiveTheme(countryProjects.projects, selected);
        if (!active) return base;

        const hasMatchingProject = countryProjects.projects.some(proj => {
          const themeMatch = selected === "__ALL__" || (proj.themes || []).includes(selected);
          const statusMatch = statusFilter === "all" || proj.pilot_status === "Live";
          return themeMatch && statusMatch;
        });

        if (!hasMatchingProject) return base;

        const fill = selected === "__ALL__"
          ? defaultColor
          : (themeColors[selected] || defaultColor);

        return {
          ...base,
          opacity: 0.95,
          weight: 1.4,
          fillColor: fill,
          fillOpacity: 0.55
        };
      }

      const infoPanel = document.getElementById("infoPanel");
      const infoPanelTitle = document.getElementById("infoPanelTitle");
      const infoPanelMeta = document.getElementById("infoPanelMeta");
      const infoPanelBody = document.getElementById("infoPanelBody");

      function openPanel(countryProjects, latlng) {
        if (!countryProjects.projects || countryProjects.projects.length === 0) {
          closePanel();
          return;
        }

        const filteredProjects = countryProjects.projects.filter(proj => {
          const themeMatch = themeSelect.value === "__ALL__" || proj.themes.includes(themeSelect.value);
          const statusMatch = statusFilter === "all" || proj.pilot_status === "Live";
          return themeMatch && statusMatch;
        });

        if (filteredProjects.length === 0) {
          closePanel();
          return;
        }

        infoPanelTitle.textContent = countryProjects.country;
        infoPanelMeta.textContent = `${filteredProjects.length} Pilot${filteredProjects.length === 1 ? "" : "s"}`;

        const displayedProjects = filteredProjects.slice(0, 3);
        const extraProjects = filteredProjects.slice(3);

        infoPanelBody.innerHTML = `
          ${displayedProjects.map(proj => `
            <div class="panel-project">
              <div class="panel-project-title">${proj.project}</div>
              <div class="panel-row"><strong>Pilot Status:</strong> ${proj.pilot_status || "-"}</div>
              ${renderThemeChips(proj.themes)}
              ${proj.url ? `<a href="${proj.url}" class="project-button" target="_blank">Learn more</a>` : ""}
            </div>
          `).join("")}

          ${extraProjects.length > 0 ? `
            <div class="panel-hint">Scroll for more Pilots.</div>
            <div class="scrollable-projects">
              ${extraProjects.map(proj => `
                <div class="panel-project">
                  <div class="panel-project-title">${proj.project}</div>
                  <div class="panel-row"><strong>Pilot Status:</strong> ${proj.pilot_status || "-"}</div>
                  ${renderThemeChips(proj.themes)}
                  ${proj.url ? `<a href="${proj.url}" class="project-button" target="_blank">Learn more</a>` : ""}
                </div>
              `).join("")}
            </div>
          ` : ''}
        `;

        infoPanel.style.display = "block";
      }

      function closePanel() {
        infoPanel.style.display = "none";
        infoPanelTitle.textContent = "Projects";
        infoPanelMeta.textContent = "";
        infoPanelBody.innerHTML = "";
      }

      let geoLayer = null;

      const GEOJSON_URL =
        "https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_110m_admin_0_countries.geojson";

      async function init() {
        let geojson;
        try {
          const res = await fetch(GEOJSON_URL);
          if (!res.ok) throw new Error(`GeoJSON fetch failed: ${res.status} ${res.statusText}`);
          geojson = await res.json();
        } catch (e) {
          console.error("Error fetching GeoJSON", e);
          alert("Could not load country boundaries (GeoJSON). Check the console for details.");
          return;
        }

        geoLayer = L.geoJSON(geojson, {
          style: regionStyle,
          onEachFeature: (feature, layer) => {
            const iso = getIsoFromFeature(feature);
            const countryProjects = projectByIso.get(iso);
            if (!countryProjects) return;

            layer.on("mouseover", (e) => {
              const countryProjects = projectByIso.get(getIsoFromFeature(e.target.feature));
              if (!countryProjects) return;

              const html = buildPopupHTML(countryProjects);
              if (!html) return;

              hoverPopup
                .setLatLng(e.latlng)
                .setContent(html)
                .openOn(map);
            });

            layer.on("mouseout", (e) => {
              const related = e && e.originalEvent && e.originalEvent.relatedTarget;
              if (related && related.closest && related.closest('.project-popup')) {
                return;
              }
              map.closePopup(hoverPopup);
            });

            layer.on("click", (e) => {
              const countryProjects = projectByIso.get(getIsoFromFeature(e.target.feature));
              if (!countryProjects) return;
              openPanel(countryProjects, e.latlng);
            });
          }
        }).addTo(map);

        map.on("click", (e) => {
          const clickedOnCountry = e.originalEvent?.target?.closest?.('.leaflet-interactive');
          if (!clickedOnCountry) {
            closePanel();
            map.closePopup(hoverPopup);
          }
        });

        const bounds = [];
        geoLayer.eachLayer(l => {
          const iso = getIsoFromFeature(l.feature);
          if (projectByIso.has(iso)) bounds.push(l.getBounds());
        });

        if (bounds.length) {
          const combined = bounds.reduce((acc, b) => acc.extend(b), bounds[0]);
          map.fitBounds(combined.pad(0.3));
        }
      }

      map.on('popupopen', (e) => {
        const el = e.popup.getElement && e.popup.getElement();
        const content = el && el.querySelector('.popup-body');
        if (!content) return;

        const stop = (ev) => ev.stopPropagation();

        content.addEventListener('wheel', stop, { passive: false });
        content.addEventListener('touchstart', stop, { passive: false });
        content.addEventListener('touchmove', stop, { passive: false });

        const disableDragging = () => map.dragging.disable();
        const enableDragging = () => map.dragging.enable();

        content.addEventListener('mouseenter', disableDragging);
        content.addEventListener('mouseleave', enableDragging);
        content.addEventListener('touchstart', disableDragging, { passive: false });
        content.addEventListener('touchend', enableDragging, { passive: false });

        e.popup._cleanupScroll = () => {
          content.removeEventListener('wheel', stop);
          content.removeEventListener('touchstart', stop);
          content.removeEventListener('touchmove', stop);
          content.removeEventListener('mouseenter', disableDragging);
          content.removeEventListener('mouseleave', enableDragging);
          content.removeEventListener('touchstart', disableDragging);
          content.removeEventListener('touchend', enableDragging);
        };
      });

      map.on('popupclose', (e) => {
        if (e.popup && e.popup._cleanupScroll) e.popup._cleanupScroll();
      });

      themeSelect.addEventListener("change", () => {
        updateThemeDot();
        updateProjectCount();
        if (geoLayer) {
          geoLayer.setStyle(regionStyle);
          closePanel();
          map.closePopup(hoverPopup);
        }
      });

      themeDropdownButton.addEventListener("click", () => {
        const isOpen = themeDropdown.classList.toggle("open");
        themeDropdownButton.setAttribute("aria-expanded", isOpen ? "true" : "false");
      });

      themeDropdownMenu.addEventListener("click", (event) => {
        const option = event.target.closest(".theme-dropdown-option");
        if (!option) return;
        themeSelect.value = option.dataset.value;
        themeSelect.dispatchEvent(new Event("change"));
        themeDropdown.classList.remove("open");
        themeDropdownButton.setAttribute("aria-expanded", "false");
      });

      document.addEventListener("click", (event) => {
        if (!themeDropdown.contains(event.target)) {
          themeDropdown.classList.remove("open");
          themeDropdownButton.setAttribute("aria-expanded", "false");
        }
      });

      init();
    });
  </script>
</body>
</html>
